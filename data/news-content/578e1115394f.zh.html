<p>我不断听到有人分享使用编程代理对家中设备进行逆向工程和自动化的经历。</p>
<p>我认为这很好地说明了代码编写成本降低带来的影响。</p>
<p>在代理出现之前，对家用设备进行逆向工程完全是可行的。问题在于投入产出比——真的值得花那么多精力吗？更重要的是，任何有经验的程序员都知道，像这样没有文档、不稳定的 API 未来很可能会改变或失效。如果这意味着你要陷入令人沮丧的维护循环，那么最初的投入还值得吗？</p>
<p>编程代理彻底改变了这个等式。让一个简单自动化功能运转起来所需的努力减少了，尝试和失败的成本也降低了。既然代码变得如此廉价，未来需要维护它——或者干脆推倒重来——所伴随的心理负担也就小得多了。</p>
