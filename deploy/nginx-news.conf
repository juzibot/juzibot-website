# ============================================================================
# 动态页(news)产物路由 —— 需运维加进 jz-main 与 jz-stage-* 的每个 server 块
# ============================================================================
# 背景(2026-07-23 架构): 动态页生成物不进 git。news-cron CI 每 6 小时跑
# build_news.py, 产物 rsync 到独立目录 /opt/www/jz-news/ ——它不在任何
# git 部署目录(/opt/www/jz-<branch>)里, deploy 的 git checkout -f + clean
# 永远不会碰它。对外路由靠下面三条 location 把动态页指过去:
#
#   /news.html   卡片流列表页(全站导航「动态」入口)
#   /news-c.html 聚合版列表页
#   /news/...    详情页(/news/p/)、概念页(/news/c/)、本地化图片(/news/img/)
#
# /opt/www/jz-news/data/ 是管线状态(增量记忆/正文镜像), 不对外——没有对应
# location 即不可达, 勿添加。
#
# 放置建议: 保存为 /etc/nginx/snippets/jz-news.conf, 在每个需要动态页的
# server 块里 include 一行:
#   include snippets/jz-news.conf;
# 然后 nginx -t && systemctl reload nginx。
# ============================================================================

location = /news.html   { root /opt/www/jz-news; }
location = /news-c.html { root /opt/www/jz-news; }
# ^~ 前缀匹配优先于正则 location, 防站点其它规则(如 never-404 兜底)劫持
location ^~ /news/      { root /opt/www/jz-news; }
