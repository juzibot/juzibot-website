# ─────────────────────────────────────────────────────────────────────────
# 句子互动官网 · "永不 404" nginx 兜底规则
#
# 背景：旧双语站 /zh/* /en/* 路由已下线，被 Google 索引的旧链会 404。
# 仓库里的 116 个静态跳转桩已覆盖所有"已知"旧路由（push 后即生效，无需动服务器）。
# 但要保证「任意未知/未来路径都不 404」，需要下面这段 nginx 兜底——只能在服务器上加。
#
# 应用方式（在服务器上，需要 sudo）：
#   1. 找到 juzibot.com 的 server {} 配置：grep -rl 'server_name .*juzibot' /etc/nginx/
#   2. 把下面 ★ 之间的内容粘到那个 server {} 块里（root 指令之后即可）
#   3. 校验并重载：sudo nginx -t && sudo systemctl reload nginx
#   4. 验证：curl -sI https://juzibot.com/zh/随便  应返回 301 → https://juzibot.com/
#          curl -sI https://juzibot.com/不存在的路径  也应 301 → 首页
#
# 注意：error_page 404 兜底会把所有原本 404 的请求都 301 到首页（这正是你要的
#       "不出现 404"）。SEO 上这叫 soft-404，Google 可能标记，但对真实页面排名无害，
#       且远好过用户撞 404。真实页面（/、*.html、/products/*、/workforce/* 等）返回
#       200，不受影响。
# ─────────────────────────────────────────────────────────────────────────

# ★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★

# 旧双语 locale 整树 301 到干净首页。
# 用 ^~ 前缀匹配 /zh/ 和 /en/，并用 = 精确匹配裸 /zh /en，
# 这样不会误伤 /enterprise.html 这类以 "en" 开头但不是 locale 的真实页面。
location = /zh { return 301 https://juzibot.com/; }
location ^~ /zh/ { return 301 https://juzibot.com/; }
location = /en { return 301 https://juzibot.com/; }
location ^~ /en/ { return 301 https://juzibot.com/; }

# 终极兜底：任何其它本会 404 的路径，一律 301 到干净首页。
error_page 404 = @never404;
location @never404 { return 301 https://juzibot.com/; }

# ★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★
