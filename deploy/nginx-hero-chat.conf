# ─────────────────────────────────────────────────────────────────────────
# 句子互动官网 · 首页 Hero 实时对话代理 nginx 反代
#
# 作用：把同源的 /api/hero-chat 反代到本机上的 hero-chat 代理服务(默认 :8787)，
#       前端只调同源接口，密钥永不进浏览器。
#
# ⚠️ 必须放在 nginx-never-404.conf 的 error_page 404 兜底【之前】(或用 ^~ 高优先级
#    前缀匹配)，否则 /api/hero-chat 会被当成静态文件找不到 → 301 回首页。
#
# 应用方式（服务器上，sudo）：
#   1. 先按 server/hero-chat/README.md 用 systemd 把代理服务跑起来(监听 127.0.0.1:8787)
#   2. 找到 juzibot.com 的 server {} ：grep -rl 'server_name .*juzibot' /etc/nginx/
#   3. 把下面 ★ 之间的内容粘进那个 server {} 块(放在 never-404 规则上方)
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. 验证：curl -s https://juzibot.com/api/hero-chat/health  → {"ok":true,...}
# ─────────────────────────────────────────────────────────────────────────

# ★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★
location ^~ /api/hero-chat {
    proxy_pass         http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_read_timeout 60s;          # 略大于代理 JZ_UPSTREAM_TIMEOUT_MS(默认 50s; 该 bot 实测 20~37s)
    proxy_buffering    off;          # 为将来上游流式留口子
}
# ★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★
