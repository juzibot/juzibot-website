<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440, initial-scale=1">
<title>句子秒懂 · 模型选择中心</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root{
  --ink:#0E1525;
  --ink-2:#52607A;
  --ink-3:#8A97AD;
  --line:#E8EDF5;
  --line-strong:#D7E1F0;
  --bg:#F2F5FA;
  --panel:#FFFFFF;
  --soft:#F8FAFD;
  --blue:#1659E5;
  --blue-soft:#EAF1FF;
  --green:#00B578;
  --green-soft:#E9FBF3;
  --orange:#FF7A00;
  --orange-soft:#FFF3E7;
  --purple:#6D5EF8;
  --purple-soft:#F0EEFF;
  --shadow:0 18px 40px -30px rgba(20,35,75,.20), 0 6px 16px -14px rgba(20,35,75,.12);
}
body{
  font-family:"PingFang SC",-apple-system,"Segoe UI","Helvetica Neue",sans-serif;
  background:
    radial-gradient(760px 420px at 84% -8%, rgba(22,89,229,.10), transparent 54%),
    radial-gradient(620px 360px at 0% 8%, rgba(22,89,229,.05), transparent 52%),
    var(--bg);
  color:var(--ink);
  font-size:14px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
.app{
  width:1440px;
  height:820px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.topbar{
  height:62px;
  flex:none;
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 18px;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(215,225,240,.85);
}
.tb-brand{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}
.tb-logo{
  width:34px;
  height:34px;
  border-radius:10px;
  display:grid;
  place-items:center;
  color:#fff;
  font-weight:700;
  font-size:15px;
  background:linear-gradient(135deg,#1659E5,#5A7BFF);
  box-shadow:0 10px 20px -10px rgba(22,89,229,.55);
}
.tb-logo.has-image,
.provider-badge.has-image{
  background:#fff;
  box-shadow:inset 0 0 0 1px rgba(209,219,233,.92), 0 8px 16px -14px rgba(20,35,75,.18);
}
.tb-logo img,
.provider-badge img{
  display:block;
  width:100%;
  height:100%;
  object-fit:contain;
}
.tb-logo.has-image{
  padding:6px;
}
.provider-badge.has-image{
  padding:4px;
}
.tb-copy b{
  display:block;
  font-size:14px;
  font-weight:760;
  letter-spacing:-.02em;
}
.tb-copy span{
  display:block;
  margin-top:2px;
  font-size:11px;
  color:var(--ink-3);
}
.tb-tabs{
  display:flex;
  align-items:center;
  gap:6px;
  margin-left:14px;
}
.tb-tab{
  padding:8px 12px;
  border-radius:10px;
  border:1px solid transparent;
  color:var(--ink-2);
  font-size:12px;
  font-weight:650;
  background:transparent;
}
.tb-tab.active{
  background:var(--blue-soft);
  color:var(--blue);
  border-color:rgba(22,89,229,.14);
}
.tb-actions{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:8px;
}
.tb-pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  font-size:11px;
  font-weight:720;
  color:var(--green);
  background:var(--green-soft);
  border-radius:999px;
}
.tb-pill i{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 10px rgba(0,181,120,.45);
}
.tb-btn{
  padding:8px 12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#fff;
  color:var(--ink-2);
  font-size:12px;
  font-weight:700;
  transition:transform .14s cubic-bezier(.2,0,0,1), border-color .14s ease, background-color .14s ease, box-shadow .14s ease, color .14s ease;
}
.tb-btn.primary{
  border-color:transparent;
  background:linear-gradient(135deg,#1659E5,#3E74FF);
  color:#fff;
  box-shadow:0 10px 24px -14px rgba(22,89,229,.58);
}
.shell{
  flex:1;
  display:grid;
  grid-template-columns:276px 1fr;
  gap:14px;
  padding:14px;
  min-height:0;
}
.sidebar,
.workspace{
  min-height:0;
}
.sidebar{
  display:flex;
  flex-direction:column;
  gap:10px;
  height:100%;
}
.side-card,
.board{
  background:rgba(255,255,255,.84);
  border:1px solid rgba(215,225,240,.86);
  box-shadow:var(--shadow);
  border-radius:18px;
  backdrop-filter:blur(8px);
}
.side-card{
  padding:13px;
  height:100%;
  min-height:0;
  display:flex;
  flex-direction:column;
}
.side-hd{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}
.side-hd b{
  display:block;
  font-size:13px;
  font-weight:760;
  letter-spacing:-.01em;
}
.side-hd span{
  display:block;
  margin-top:2px;
  font-size:11px;
  color:var(--ink-3);
}
.side-stat{
  flex:none;
  padding:4px 8px;
  font-size:10.5px;
  font-weight:720;
  color:var(--blue);
  background:var(--blue-soft);
  border-radius:999px;
}
.search{
  margin-top:12px;
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  background:var(--soft);
  border:1px solid var(--line);
  border-radius:12px;
  color:var(--ink-3);
  font-size:12px;
}
.search .dot{
  width:10px;
  height:10px;
  border:2px solid currentColor;
  border-radius:50%;
  position:relative;
}
.search .dot::after{
  content:"";
  position:absolute;
  right:-4px;
  bottom:-4px;
  width:5px;
  height:2px;
  border-radius:2px;
  background:currentColor;
  transform:rotate(45deg);
}
.provider-list{
  margin-top:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
  flex:1;
  min-height:0;
  overflow:auto;
  padding-right:4px;
}
.provider{
  width:100%;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 11px;
  border:1px solid transparent;
  border-radius:14px;
  background:#fff;
  color:var(--ink);
  text-align:left;
  transition:transform .16s cubic-bezier(.2,0,0,1), box-shadow .16s ease, border-color .16s ease, background-color .16s ease;
  cursor:pointer;
}
.provider:hover{
  transform:translateY(-1px);
  border-color:rgba(22,89,229,.14);
  box-shadow:0 12px 20px -20px rgba(20,35,75,.28);
}
.provider.active{
  border-color:color-mix(in srgb, var(--accent, var(--blue)) 28%, #D8E2F0);
  background:linear-gradient(135deg, color-mix(in srgb, var(--accent, var(--blue)) 11%, #FFFFFF), #FFFFFF);
  box-shadow:0 14px 24px -22px color-mix(in srgb, var(--accent, var(--blue)) 34%, transparent);
}
.provider-badge{
  width:30px;
  height:30px;
  flex:none;
  display:grid;
  place-items:center;
  border-radius:10px;
  font-size:11.5px;
  font-weight:760;
  color:#fff;
  background:linear-gradient(135deg, var(--accent, #1659E5), color-mix(in srgb, var(--accent, #1659E5) 56%, #ffffff));
  box-shadow:0 10px 18px -12px color-mix(in srgb, var(--accent, #1659E5) 75%, transparent);
}
.provider-copy{
  min-width:0;
  flex:1;
}
.provider-copy b{
  display:block;
  font-size:13px;
  font-weight:720;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.provider-copy span{
  display:block;
  margin-top:1px;
  font-size:11px;
  color:var(--ink-3);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.provider-arrow{
  font-size:14px;
  color:var(--ink-3);
}
.hint{
  margin-top:12px;
  padding:11px 12px;
  border-radius:14px;
  background:linear-gradient(180deg,#F9FBFF,#F4F7FD);
  border:1px solid var(--line);
}
.hint b{
  display:block;
  font-size:11.5px;
  font-weight:760;
}
.hint p{
  margin-top:5px;
  color:var(--ink-2);
  font-size:11.5px;
  line-height:1.55;
  text-wrap:pretty;
}
.workspace{
  min-width:0;
}
.board{
  height:100%;
  padding:14px;
  display:grid;
  grid-template-rows:auto auto minmax(0,1fr);
  gap:12px;
}
.hero{
  display:grid;
  grid-template-columns:minmax(0,1fr) 220px;
  gap:12px;
}
.hero-main,
.hero-side{
  border:1px solid var(--line);
  border-radius:16px;
  background:linear-gradient(180deg,#FFFFFF,#FBFCFF);
  padding:14px;
}
.hero-main{
  position:relative;
  overflow:hidden;
}
.hero-main::after{
  content:"";
  position:absolute;
  right:-100px;
  top:-130px;
  width:220px;
  height:220px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(22,89,229,.13), transparent 66%);
  pointer-events:none;
}
.hero-kicker{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:5px 9px;
  border-radius:999px;
  background:var(--blue-soft);
  color:var(--blue);
  font-size:10.5px;
  font-weight:760;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.hero-title{
  margin-top:10px;
  font-size:26px;
  line-height:1.08;
  letter-spacing:-.04em;
  font-weight:820;
  text-wrap:balance;
}
.hero-desc{
  margin-top:10px;
  max-width:60ch;
  color:var(--ink-2);
  font-size:13px;
  line-height:1.6;
  text-wrap:pretty;
}
.hero-meta{
  margin-top:12px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.meta-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fff;
  font-size:11.5px;
  font-weight:680;
  color:var(--ink-2);
}
.meta-chip i{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent, var(--blue));
}
.hero-foot{
  margin-top:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.hero-foot span{
  color:var(--ink-3);
  font-size:11.5px;
}
.hero-foot b{
  color:var(--ink);
  font-size:12.5px;
}
.hero-side{
  display:grid;
  gap:10px;
  align-content:start;
}
.microstat{
  padding:11px 12px;
  border-radius:13px;
  background:#fff;
  border:1px solid var(--line);
}
.microstat .k{
  font-size:11px;
  color:var(--ink-3);
}
.microstat .v{
  margin-top:4px;
  font-size:18px;
  font-weight:780;
  letter-spacing:-.03em;
  font-variant-numeric:tabular-nums;
}
.microstat .s{
  margin-top:4px;
  color:var(--ink-2);
  font-size:11.5px;
  text-wrap:pretty;
}
.toolbar{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}
.toolbar-left{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.toolbar-title{
  font-size:12.5px;
  font-weight:720;
  color:var(--ink);
  margin-right:3px;
}
.filter{
  border:none;
  background:#fff;
  color:var(--ink-2);
  border:1px solid var(--line);
  padding:7px 10px;
  border-radius:999px;
  font-size:11.5px;
  font-weight:680;
  cursor:pointer;
  transition:transform .14s cubic-bezier(.2,0,0,1), color .14s ease, background-color .14s ease, border-color .14s ease, box-shadow .14s ease;
}
.filter.active{
  color:#fff;
  background:linear-gradient(135deg,var(--blue),#4C79FF);
  border-color:transparent;
  box-shadow:0 8px 14px -12px rgba(22,89,229,.38);
}
.toolbar-right{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:8px;
}
.toolbar-note{
  font-size:11.5px;
  color:var(--ink-3);
}
.toolbar-switch{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:7px 10px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#fff;
  color:var(--ink-2);
  font-size:11.5px;
  font-weight:700;
}
.switch-knob{
  width:28px;
  height:16px;
  border-radius:999px;
  background:rgba(22,89,229,.14);
  position:relative;
}
.switch-knob::after{
  content:"";
  position:absolute;
  right:2px;
  top:2px;
  width:12px;
  height:12px;
  border-radius:50%;
  background:var(--blue);
}
.content{
  min-height:0;
  display:grid;
  grid-template-columns:minmax(0,1fr) 276px;
  gap:12px;
}
.catalog,
.detail{
  min-height:0;
  border:1px solid var(--line);
  border-radius:16px;
  background:rgba(255,255,255,.92);
}
.catalog{
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.catalog-hd{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
  padding:4px 4px 0;
}
.catalog-hd b{
  display:block;
  font-size:14px;
  font-weight:760;
}
.catalog-hd span{
  display:block;
  margin-top:3px;
  font-size:11.5px;
  color:var(--ink-3);
}
.catalog-tag{
  flex:none;
  padding:5px 9px;
  border-radius:999px;
  background:var(--soft);
  border:1px solid var(--line);
  color:var(--ink-2);
  font-size:11px;
  font-weight:700;
  font-variant-numeric:tabular-nums;
}
.model-list{
  min-height:0;
  overflow:auto;
  padding-right:4px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.model-empty{
  padding:18px 16px;
  border:1px dashed var(--line-strong);
  border-radius:16px;
  background:linear-gradient(180deg,#FFFFFF,#F8FBFF);
  color:var(--ink-2);
}
.model-empty b{
  display:block;
  font-size:13px;
  font-weight:760;
  color:var(--ink);
}
.model-empty span{
  display:block;
  margin-top:6px;
  font-size:11.5px;
  line-height:1.6;
  text-wrap:pretty;
}
.model-list::-webkit-scrollbar,
.provider-list::-webkit-scrollbar{
  width:8px;
}
.model-list::-webkit-scrollbar-thumb,
.provider-list::-webkit-scrollbar-thumb{
  background:#D7E1F0;
  border-radius:999px;
}
.model{
  position:relative;
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid var(--line);
  background:linear-gradient(180deg,#FFFFFF,#FBFCFF);
  cursor:pointer;
  transition:transform .16s cubic-bezier(.2,0,0,1), border-color .16s ease, box-shadow .16s ease, background-color .16s ease;
}
.model:hover{
  transform:translateY(-1px);
  border-color:color-mix(in srgb, var(--accent, var(--blue)) 20%, #D8E2F0);
  box-shadow:0 14px 18px -18px rgba(20,35,75,.24);
}
.model.active{
  border-color:color-mix(in srgb, var(--accent, var(--blue)) 26%, #D8E2F0);
  background:linear-gradient(135deg, color-mix(in srgb, var(--accent, var(--blue)) 10%, #FFFFFF), #FFFFFF);
  box-shadow:0 14px 22px -20px color-mix(in srgb, var(--accent, var(--blue)) 28%, transparent);
}
.model::before{
  content:"";
  position:absolute;
  left:0;
  top:10px;
  bottom:10px;
  width:3px;
  border-radius:4px;
  background:transparent;
}
.model.active::before{
  background:var(--accent, var(--blue));
}
.model-main{
  min-width:0;
}
.model-title{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.model-title b{
  font-size:15px;
  line-height:1.16;
  letter-spacing:-.02em;
  text-wrap:balance;
}
.model-badge{
  padding:4px 8px;
  border-radius:999px;
  background:color-mix(in srgb, var(--accent, var(--blue)) 10%, #FFFFFF);
  color:var(--accent, var(--blue));
  font-size:10.5px;
  font-weight:760;
}
.model-sub{
  margin-top:5px;
  color:var(--ink-2);
  font-size:12px;
  text-wrap:pretty;
}
.model-sub:empty,
.model-tags:empty,
.model-meta:empty{
  display:none;
}
.model-tags{
  margin-top:9px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.tag{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:680;
  color:var(--ink-2);
  background:var(--soft);
  border:1px solid var(--line);
}
.tag::before{
  content:"";
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--accent, var(--blue));
}
.model-meta{
  min-width:168px;
  display:grid;
  gap:6px;
  align-content:start;
}
.price-row{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:8px;
  font-size:11.5px;
  color:var(--ink-2);
  font-variant-numeric:tabular-nums;
}
.price-row strong{
  color:var(--ink);
  font-size:12.5px;
}
.context{
  justify-self:end;
  padding:6px 9px;
  border-radius:10px;
  background:#fff;
  border:1px solid var(--line);
  font-size:11px;
  color:var(--ink-2);
  text-align:right;
  font-variant-numeric:tabular-nums;
}
.detail{
  padding:14px;
  display:grid;
  grid-template-rows:auto auto 1fr;
  gap:10px;
}
.detail-hd{
  padding:2px 2px 0;
}
.detail-hd b{
  display:block;
  font-size:14px;
  font-weight:760;
}
.detail-hd span{
  display:block;
  margin-top:3px;
  color:var(--ink-3);
  font-size:11.5px;
}
.detail-card{
  border:1px solid var(--line);
  border-radius:14px;
  background:linear-gradient(180deg,#FFFFFF,#FAFCFF);
  padding:13px;
}
.detail-card h3{
  font-size:18px;
  line-height:1.14;
  letter-spacing:-.03em;
  text-wrap:balance;
}
.detail-card p{
  margin-top:6px;
  color:var(--ink-2);
  font-size:12.5px;
  line-height:1.55;
  text-wrap:pretty;
}
.detail-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.mini{
  padding:10px;
  border-radius:12px;
  background:#fff;
  border:1px solid var(--line);
}
.mini.full{
  grid-column:1 / -1;
}
.mini .k{
  font-size:10.5px;
  color:var(--ink-3);
}
.mini .v{
  margin-top:4px;
  font-size:12.5px;
  font-weight:730;
  color:var(--ink);
  font-variant-numeric:tabular-nums;
  text-wrap:pretty;
}
.provider:active,
.model:active,
.filter:active,
.tb-btn:active{
  transform:scale(.96);
}
@media (prefers-reduced-motion:no-preference){
  .provider,
  .model{
    animation:rise .44s cubic-bezier(.22,1,.36,1) both;
  }
  .provider:nth-child(2){animation-delay:.03s}
  .provider:nth-child(3){animation-delay:.06s}
  .provider:nth-child(4){animation-delay:.09s}
  .provider:nth-child(5){animation-delay:.12s}
  .provider:nth-child(6){animation-delay:.15s}
  .provider:nth-child(7){animation-delay:.18s}
  .provider:nth-child(8){animation-delay:.21s}
  .provider:nth-child(9){animation-delay:.24s}
  .provider:nth-child(10){animation-delay:.27s}
  .provider:nth-child(11){animation-delay:.30s}
  .provider:nth-child(12){animation-delay:.33s}
  .provider:nth-child(13){animation-delay:.36s}
  .provider:nth-child(14){animation-delay:.39s}
  .provider:nth-child(15){animation-delay:.42s}
}
@keyframes rise{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:none}
}
</style>
</head>
<body>
<div class="app">

let activeProvider = providers[0].key;
let activeModel = providers[0].models[0].name;
let activeFilter = "all";

const providerIconPaths = {
  gpt: "../modelicon/chatgpt.svg",
  doubao: "../modelicon/doubao.svg",
  claude: "../modelicon/claude.svg",

const providerList = document.getElementById("providerList");
const modelList = document.getElementById("modelList");
const providerCount = document.getElementById("providerCount");
const tbLogo = document.getElementById("tbLogo");
const catalogTitle = document.getElementById("catalogTitle");
const catalogTag = document.getElementById("catalogTag");
const heroTitle = document.getElementById("heroTitle");
const heroDesc = document.getElementById("heroDesc");
const heroMeta = document.getElementById("heroMeta");
const heroFoot = document.getElementById("heroFoot");
const heroBest = document.getElementById("heroBest");
const heroSide = document.getElementById("heroSide");
const detailTitle = document.getElementById("detailTitle");
const detailDesc = document.getElementById("detailDesc");
const detailGrid = document.getElementById("detailGrid");
const filterNote = document.getElementById("filterNote");

providerCount.textContent = providers.length + " 家";

function currentProvider() {
  return providers.find((item) => item.key === activeProvider) || providers[0];
}

function getProviderIconMarkup(provider) {
  const iconPath = providerIconPaths[provider.key];
  if (!iconPath) return provider.short || provider.name.slice(0, 2);
  const safeName = (provider.name || provider.key).replace(/"/g, "&quot;");
  return `<img src="${iconPath}" alt="${safeName} logo" loading="eager" decoding="async">`;
}

function hasProviderIcon(provider) {
  return !!providerIconPaths[provider.key];
}

function currentModels() {
  const models = currentProvider().models;
  if (activeFilter === "all") return models;
  return models.filter((item) => item.tags.includes(activeFilter));
}

function ensureModelVisible(models) {
  if (!models.length) {
    activeModel = "";
    return;
  }
  const exists = models.some((item) => item.name === activeModel);
  if (!exists && models.length) activeModel = models[0].name;
}

function renderProviders() {
  providerList.innerHTML = providers.map((item) => `
    <button
      class="provider${item.key === activeProvider ? " active" : ""}"
      type="button"
      role="tab"
      aria-selected="${item.key === activeProvider}"
      data-provider="${item.key}"
      style="--accent:${item.accent}">
      <span class="provider-badge${hasProviderIcon(item) ? " has-image" : ""}">${getProviderIconMarkup(item)}</span>
      <span class="provider-copy">
        <b>${item.name}</b>
        <span>${item.vendor}</span>
      </span>
      <span class="provider-arrow">›</span>
    </button>
  `).join("");
}

function updateProviderSelection() {
  providerList.querySelectorAll("[data-provider]").forEach((button) => {
    const isActive = button.dataset.provider === activeProvider;
    button.classList.toggle("active", isActive);
    button.setAttribute("aria-selected", isActive ? "true" : "false");
  });
}

function renderHero(provider) {
  tbLogo.className = `tb-logo${hasProviderIcon(provider) ? " has-image" : ""}`;
  tbLogo.innerHTML = getProviderIconMarkup(provider);
  heroDesc.textContent = provider.description;
  heroFoot.textContent = provider.vendor + " · " + provider.reliability + " · " + provider.latency;
  heroBest.textContent = provider.best;
  heroMeta.innerHTML = provider.strengths.map((item) => `
    <span class="meta-chip" style="--accent:${provider.accent}">
      <i aria-hidden="true"></i>${item}
    </span>
  `).join("");
  heroSide.innerHTML = `
    <div class="microstat">
      <div class="k">主推策略</div>
      <div class="v">${provider.price}</div>
      <div class="s">根据预算与稳定性灵活组合</div>
    </div>
    <div class="microstat">
      <div class="k">当前供应商</div>
      <div class="v">${provider.name}</div>
      <div class="s">${provider.vendor}</div>
    </div>
    <div class="microstat">
      <div class="k">推荐方向</div>
      <div class="v">${provider.models.length} 个版本</div>
      <div class="s">覆盖旗舰、均衡与高频调用</div>
    </div>
  `;
}

function renderModels(options = {}) {
  const preserveScroll = !!options.preserveScroll;
  const previousScrollTop = preserveScroll ? modelList.scrollTop : 0;
  const provider = currentProvider();
  const models = currentModels();
  ensureModelVisible(models);
  catalogTitle.textContent = provider.name + " 模型列表";
  catalogTag.textContent = "共 " + models.length + " 个模型";
  function getModelMetrics(model) {
    return [
      model.note ? { label: "计费", value: model.note } : null,
      model.input ? { label: "输入", value: model.input } : null,
      model.output ? { label: "输出", value: model.output } : null,
      model.cache ? { label: "缓存", value: model.cache } : null,
      model.context ? { label: "上下文", value: model.context, context: true } : null
    ].filter(Boolean);
  }
  function hasModelMeta(model) {
    return getModelMetrics(model).length > 0;
  }
  function hasModelAbility(model) {
    return Array.isArray(model.ability) && model.ability.length > 0;
  }
  function getModelSubtitle(model) {
    const subtitle = (model.subtitle || "").trim();
    if (!subtitle) return "";
    if (subtitle.includes("后台")) return "";
    if (!hasModelMeta(model) && !hasModelAbility(model)) return "";
    return subtitle;
  }
  function renderMetric(metric) {
    if (metric.context) {
      return `<span class="context">${metric.label}<br><strong>${metric.value}</strong></span>`;
    }
    return `<span class="price-row"><strong>${metric.label}</strong><span>${metric.value}</span></span>`;
  }
  modelList.innerHTML = models.length ? models.map((item) => `
    <button
      class="model${item.name === activeModel ? " active" : ""}"
      type="button"
      role="option"
      aria-selected="${item.name === activeModel}"
      data-model="${item.name}"
      style="--accent:${provider.accent}">
      <span class="model-main">
        <span class="model-title">
          <b>${item.name}</b>
          <span class="model-badge">${item.badge || "已接入"}</span>
        </span>
        <span class="model-sub">${getModelSubtitle(item)}</span>
        <span class="model-tags">
          ${(item.ability || []).map((tag) => `<span class="tag">${tag}</span>`).join("")}
        </span>
      </span>
      <span class="model-meta">
        ${(function () {
          const metrics = getModelMetrics(item);
          return metrics.map(renderMetric).join("");
        })()}
      </span>
    </button>
  `).join("") : `
    <div class="model-empty" role="status" aria-live="polite">
      <b>当前筛选下暂无模型</b>
      <span>可以切换到其他能力标签，或切回“全部模型”查看该供应商当前接入的版本。</span>
    </div>
  `;
  if (preserveScroll) {
    const maxScrollTop = Math.max(0, modelList.scrollHeight - modelList.clientHeight);
    modelList.scrollTop = Math.min(previousScrollTop, maxScrollTop);
  }
  renderDetail(provider, models.find((item) => item.name === activeModel) || null);
}

function updateModelSelection(modelName) {
  const provider = currentProvider();
  const models = currentModels();
  const selectedModel = models.find((item) => item.name === modelName) || null;
  if (!selectedModel) return;
  activeModel = selectedModel.name;
  modelList.querySelectorAll("[data-model]").forEach((button) => {
    const isActive = button.dataset.model === activeModel;
    button.classList.toggle("active", isActive);
    button.setAttribute("aria-selected", isActive ? "true" : "false");
  });
  renderDetail(provider, selectedModel);
}

function renderDetail(provider, model) {
  if (!model) {
    detailTitle.textContent = "当前筛选暂无可用模型";
    detailDesc.textContent = "这组筛选条件下，" + provider.name + " 暂无可展示的模型版本。请切换标签，或回到“全部模型”查看完整列表。";
    detailGrid.innerHTML = `
      <div class="mini full">
        <div class="k">当前状态</div>
        <div class="v">共 0 个模型，右侧详情已切换为空状态，避免保留上一条模型信息。</div>
      </div>
    `;
    return;
  }
  const metrics = [
    model.note ? { label: "计费说明", value: model.note } : null,
    model.input ? { label: "输入价格", value: model.input } : null,
    model.output ? { label: "输出价格", value: model.output } : null,
    model.cache ? { label: "缓存价格", value: model.cache } : null,
    model.context ? { label: "上下文长度", value: model.context } : null
  ].filter(Boolean);
  detailTitle.textContent = model.name;
  detailDesc.textContent = model.detail || "当前按后台真实字段展示，未出现的字段不额外补充。";
  detailGrid.innerHTML = metrics.length ? metrics.map((item) => `
    <div class="mini">
      <div class="k">${item.label}</div>
      <div class="v">${item.value}</div>
    </div>
  `).join("") : "";
}

function updateFilterNote() {
  const mapping = {
    all: "看清模型边界与成本结构",
    text: "优先看文本理解、推理与长文能力",
    multi: "优先看图片、文件与多模态能力",
    tool: "优先看工具调用与流程协同能力",
    budget: "优先看高频调用下的成本控制"
  };
  filterNote.textContent = mapping[activeFilter] || mapping.all;
}

function render(options = {}) {
  const shouldRenderProviders = !!options.renderProviders || !providerList.children.length;
  const provider = currentProvider();
  if (shouldRenderProviders) {
    renderProviders();
  } else {
    updateProviderSelection();
  }
  renderHero(provider);
  renderModels();
  updateFilterNote();
}

providerList.addEventListener("click", (event) => {
  const button = event.target.closest("[data-provider]");
  if (!button) return;
  if (button.dataset.provider === activeProvider) return;
  activeProvider = button.dataset.provider;
  activeFilter = "all";
  document.querySelectorAll(".filter").forEach((item) => {
    item.classList.toggle("active", item.dataset.filter === "all");
  });
  activeModel = currentProvider().models[0].name;
  render();
});

modelList.addEventListener("click", (event) => {
  const button = event.target.closest("[data-model]");
  if (!button) return;
  if (button.dataset.model === activeModel) return;
  updateModelSelection(button.dataset.model);
});

document.querySelectorAll(".filter").forEach((button) => {
  button.addEventListener("click", () => {
    activeFilter = button.dataset.filter;
    document.querySelectorAll(".filter").forEach((item) => {
      item.classList.toggle("active", item === button);
    });
    renderModels();
    updateFilterNote();
  });
});

render({ renderProviders: true });
</script>
</body>
</html>
