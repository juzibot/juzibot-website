name: lark-notify

on:
  issues:
    types: [opened, closed, reopened, assigned]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, closed, reopened, ready_for_review, review_requested]
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Lark (card)
        env:
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
          EVENT: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          REPO: ${{ github.repository }}
          SENDER: ${{ github.event.sender.login }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request.html_url }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_URL: ${{ github.event.review.html_url }}
        run: |
          set -uo pipefail
          if [ -z "${LARK_WEBHOOK:-}" ]; then echo "no LARK_WEBHOOK secret, skip"; exit 0; fi
          TITLE=""; COLOR="grey"; SUBTITLE=""; NUM=""; LINK=""; BTN="查看"
          case "$EVENT" in
            issues)
              NUM="$ISSUE_NUM"; SUBTITLE="$ISSUE_TITLE"; LINK="$ISSUE_URL"; BTN="查看 Issue"
              case "$ACTION" in
                opened)   TITLE="🆕 新需求 #$NUM";   COLOR="orange" ;;
                closed)   TITLE="✅ Issue 关闭 #$NUM"; COLOR="grey" ;;
                reopened) TITLE="♻️ Issue 重开 #$NUM"; COLOR="orange" ;;
                assigned) TITLE="👤 Issue 指派 #$NUM"; COLOR="blue" ;;
                *)        TITLE="Issue $ACTION #$NUM"; COLOR="grey" ;;
              esac ;;
            issue_comment)
              NUM="$ISSUE_NUM"; SUBTITLE="$ISSUE_TITLE"; LINK="$COMMENT_URL"; BTN="查看评论"
              if [ -n "${IS_PR_COMMENT:-}" ]; then TITLE="💬 PR 评论 #$NUM"; else TITLE="💬 Issue 评论 #$NUM"; fi
              COLOR="grey" ;;
            pull_request)
              NUM="$PR_NUM"; SUBTITLE="$PR_TITLE"; LINK="$PR_URL"; BTN="查看 PR"
              case "$ACTION" in
                opened)           TITLE="🔀 新 PR #$NUM";       COLOR="blue" ;;
                reopened)         TITLE="♻️ PR 重开 #$NUM";      COLOR="blue" ;;
                ready_for_review) TITLE="📣 PR 可评审 #$NUM";    COLOR="blue" ;;
                review_requested) TITLE="🙋 请求评审 #$NUM";     COLOR="blue" ;;
                closed)
                  if [ "${PR_MERGED:-}" = "true" ]; then TITLE="🎉 PR 已合并 #$NUM"; COLOR="purple"; else TITLE="🚫 PR 关闭未合 #$NUM"; COLOR="red"; fi ;;
                *)                TITLE="PR $ACTION #$NUM";     COLOR="grey" ;;
              esac ;;
            pull_request_review)
              NUM="$PR_NUM"; SUBTITLE="$PR_TITLE"; LINK="$REVIEW_URL"; BTN="查看评审"
              case "$REVIEW_STATE" in
                approved)          TITLE="👍 PR 评审通过 #$NUM"; COLOR="green" ;;
                changes_requested) TITLE="🔧 PR 要求修改 #$NUM"; COLOR="orange" ;;
                commented)         TITLE="💬 PR 评审评论 #$NUM"; COLOR="grey" ;;
                *)                 TITLE="PR 评审 #$NUM";        COLOR="grey" ;;
              esac ;;
            *) TITLE="GitHub: $EVENT"; COLOR="grey"; LINK="https://github.com/$REPO" ;;
          esac
          BODY=$(printf '**%s**\n仓库: %s\n操作人: %s' "$SUBTITLE" "$REPO" "$SENDER")
          if [ "$EVENT" = "pull_request" ] && [ -n "${PR_HEAD:-}" ]; then BODY=$(printf '%s\n分支: %s → %s' "$BODY" "$PR_HEAD" "$PR_BASE"); fi
          jq -n --arg title "$TITLE" --arg color "$COLOR" --arg body "$BODY" --arg btn "$BTN" --arg url "$LINK" '{msg_type:"interactive",card:{config:{wide_screen_mode:true},header:{template:$color,title:{tag:"plain_text",content:$title}},elements:[{tag:"div",text:{tag:"lark_md",content:$body}},{tag:"action",actions:[{tag:"button",text:{tag:"plain_text",content:$btn},url:$url,type:"primary"}]}]}}' \
            | curl -s --retry 3 --retry-delay 2 --max-time 20 -X POST -H 'Content-Type: application/json' -d @- "$LARK_WEBHOOK" || true
