name: lark-notify

on:
  issues:
    types: [opened, closed, reopened, assigned]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, closed, reopened, ready_for_review, review_requested]
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Lark
        env:
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
          EVENT: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          REPO: ${{ github.repository }}
          SENDER: ${{ github.event.sender.login }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_URL: ${{ github.event.review.html_url }}
        run: |
          set -euo pipefail
          if [ -z "${LARK_WEBHOOK:-}" ]; then echo "LARK_WEBHOOK secret 未配置，跳过"; exit 0; fi
          case "$EVENT" in
            issues)
              case "$ACTION" in
                opened)   ICON="🐛 新 Issue" ;;
                closed)   ICON="✅ Issue 关闭" ;;
                reopened) ICON="♻️ Issue 重开" ;;
                assigned) ICON="👤 Issue 指派" ;;
                *)        ICON="Issue $ACTION" ;;
              esac
              TEXT="$ICON  #$ISSUE_NUM $ISSUE_TITLE
仓库: $REPO
操作人: $SENDER
$ISSUE_URL"
              ;;
            issue_comment)
              TEXT="💬 新评论  #$ISSUE_NUM $ISSUE_TITLE
仓库: $REPO
评论人: $SENDER
$COMMENT_URL"
              ;;
            pull_request)
              case "$ACTION" in
                opened)           ICON="🔀 新 PR" ;;
                reopened)         ICON="♻️ PR 重开" ;;
                ready_for_review) ICON="📣 PR 可评审" ;;
                review_requested) ICON="🙋 请求评审" ;;
                closed)
                  if [ "${PR_MERGED:-}" = "true" ]; then ICON="🎉 PR 已合并"; else ICON="🚫 PR 关闭(未合)"; fi ;;
                *)                ICON="PR $ACTION" ;;
              esac
              TEXT="$ICON  #$PR_NUM $PR_TITLE
仓库: $REPO ($PR_HEAD → $PR_BASE)
操作人: $SENDER
$PR_URL"
              ;;
            pull_request_review)
              case "$REVIEW_STATE" in
                approved)          ICON="👍 PR 评审通过" ;;
                changes_requested) ICON="🔧 PR 要求修改" ;;
                commented)         ICON="💬 PR 评审评论" ;;
                *)                 ICON="PR 评审 $REVIEW_STATE" ;;
              esac
              TEXT="$ICON  #$PR_NUM $PR_TITLE
仓库: $REPO
评审人: $SENDER
$REVIEW_URL"
              ;;
            *)
              TEXT="GitHub 事件: $EVENT / $ACTION on $REPO"
              ;;
          esac
          jq -n --arg t "$TEXT" '{msg_type:"text",content:{text:$t}}' \
            | curl -s -X POST -H 'Content-Type: application/json' -d @- "$LARK_WEBHOOK"
