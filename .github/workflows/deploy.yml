name: deploy
on:
  push:
    branches: [stage]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy stage
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key:      ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/www/juzibot
            git fetch origin stage
            git checkout -f -B stage origin/stage
            git clean -fd
            echo "deployed stage $(git rev-parse --short HEAD)"
