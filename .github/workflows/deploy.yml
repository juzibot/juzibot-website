name: deploy
on:
  push:
    branches: [stage-1, stage-2]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      BR: ${{ github.ref_name }}
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key:      ${{ secrets.SSH_KEY }}
          envs: BR
          script: |
            set -e
            case "$BR" in stage-1|stage-2) ;; *) echo "refuse branch: $BR"; exit 1 ;; esac
            DIR="/opt/www/jz-$BR"
            cd "$DIR"
            git fetch origin "$BR"
            git checkout -f -B "$BR" "origin/$BR"
            git clean -fd
            echo "deployed $BR -> $DIR ($(git rev-parse --short HEAD))"
