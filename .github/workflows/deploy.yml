name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and pull
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key:      ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/www/juzibot
            BEFORE=$(git rev-parse HEAD)
            git pull --ff-only
            AFTER=$(git rev-parse HEAD)
            if git diff --name-only "$BEFORE" "$AFTER" | grep -q '^build_pages\.py$'; then
              python3 build_pages.py
            fi
            echo "deployed $(git rev-parse --short HEAD)"
