name: deploy
on:
  push:
    branches: [stage]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy stage
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key:      ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/www/juzibot
            git fetch origin stage
            BEFORE=$(git rev-parse HEAD 2>/dev/null || echo none)
            git checkout -B stage origin/stage
            git reset --hard origin/stage
            AFTER=$(git rev-parse HEAD)
            if [ "$BEFORE" = none ] || git diff --name-only "$BEFORE" "$AFTER" | grep -q '^build_pages\.py$'; then
              python3 build_pages.py
            fi
            echo "deployed stage $(git rev-parse --short HEAD)"
