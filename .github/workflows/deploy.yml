name: deploy
on:
  push:
    branches:
      - 'stage-[0-9]'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      BR: ${{ github.ref_name }}
      WEBSITE_ENV_B64: ${{ secrets.WEBSITE_ENV }}
    steps:
      - name: SSH and deploy
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key:      ${{ secrets.SSH_KEY }}
          envs: BR,WEBSITE_ENV_B64
          script: bash /opt/www/deploy-stage.sh "$BR"

      - name: Notify Lark (card)
        if: always()
        env:
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
          BR: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          RESULT: ${{ steps.deploy.outcome }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -uo pipefail
          if [ -z "${LARK_WEBHOOK:-}" ]; then echo "no LARK_WEBHOOK secret, skip"; exit 0; fi
          if [ "$RESULT" = "success" ]; then TITLE="🚀 预览部署成功 [$BR]"; COLOR="green"; else TITLE="❌ 预览部署失败 [$BR]"; COLOR="red"; fi
          MSG1=$(printf '%s' "$COMMIT_MSG" | head -n1)
          PRNUM=$(printf '%s' "$COMMIT_MSG" | grep -oE '#[0-9]+' | head -n1 | tr -d '#' || true)
          if [ -n "$PRNUM" ]; then LINK="$SERVER_URL/$REPO/pull/$PRNUM"; BTN="查看 PR"; else LINK="$COMMIT_URL"; BTN="查看提交"; fi
          RUN_URL="$SERVER_URL/$REPO/actions/runs/$RUN_ID"
          BODY=$(printf '**%s**\n环境: %s 预览\n提交: %s\npush: %s' "$MSG1" "$BR" "${SHA:0:7}" "$ACTOR")
          jq -n --arg title "$TITLE" --arg color "$COLOR" --arg body "$BODY" --arg btn "$BTN" --arg url "$LINK" --arg run "$RUN_URL" '{msg_type:"interactive",card:{config:{wide_screen_mode:true},header:{template:$color,title:{tag:"plain_text",content:$title}},elements:[{tag:"div",text:{tag:"lark_md",content:$body}},{tag:"action",actions:[{tag:"button",text:{tag:"plain_text",content:$btn},url:$url,type:"primary"},{tag:"button",text:{tag:"plain_text",content:"Actions 日志"},url:$run,type:"default"}]}]}}' \
            | curl -s --retry 3 --retry-delay 2 --max-time 20 -X POST -H 'Content-Type: application/json' -d @- "$LARK_WEBHOOK" || true
