name: news-cron

# 动态页定时同步(2026-07-23 方向重构, 佳芮裁决): 生成物不进 git。
# 每 6 小时在 CI 里跑 build_news.py, 产物(news.html/news-c.html/news/)与管线状态(data/)
# 直接 rsync 到服务器独立目录 /opt/www/jz-news/ ——不 commit、不 push、仓库零膨胀。
#
# 数据流(状态以服务器为准闭环):
#   拉: 服务器 /opt/www/jz-news/{data,news}/ → CI 工作目录(增量管线的记忆:
#       news.json 去重/判定缓存、concepts.json 概念库、render-cache.json 渲染签名、
#       news-content/ 正文镜像、news/img/ 已下载图片、news/{p,c}/ 已生成页面)
#   跑: python3 build_news.py (增量; 页面模板壳以仓库 checkout 为准, 手工改壳走 PR)
#   推: rsync --delete 回 /opt/www/jz-news/ (下线页面/孤儿镜像同步清理)
#
# 注意:
# - schedule 只认默认分支(main)上的 workflow 文件; 进 main 前可用 workflow_dispatch 手动跑。
# - 首次上线先跑一次 seed(Actions 页 Run workflow 勾 seed): 从 git 历史最后一个含全量
#   产物的提交(SEED_REF, 图片在 LFS)把存量推上服务器; 之后常规轮才能增量续跑。
#   常规轮拉不到服务器状态会直接失败(防止空状态全量重抓烧 API)——那就是还没 seed。
# - 服务器 /opt/www/jz-news/ 与代码部署目录(/opt/www/jz-<branch>, git checkout -f + clean)
#   完全隔离, deploy 不会清掉产物; 对外路由靠 nginx 把 /news.html、/news-c.html、/news/
#   指到本目录(配置见 deploy/nginx-news.conf), data/ 是管线状态不对外。
# - 智谱 GLM key 走仓库 Secret ZHIPU_API_KEY; 缺 Secret 管线优雅降级(新条目 pending 暂缓上站)。
# - 公众号源依赖本机 lark-cli, CI 里必然单源失败——管线按设计沿用已有数据, 公众号新文靠本机
#   手动跑 build_news.py 后手动 rsync(或等后续接入)。

on:
  schedule:
    - cron: '23 */6 * * *'  # 每 6 小时; 避开整点(GitHub 整点排队延迟大)
  workflow_dispatch:
    inputs:
      seed:
        description: '首次初始化: 把 git 历史存量产物全量推到服务器(仅需跑一次)'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: news-cron
  cancel-in-progress: false

env:
  NEWS_DIR: /opt/www/jz-news
  SEED_REF: 64bec20c8339efb85f880905e179500d3b67b094  # 最后一个仓库内含全量产物的提交(此后生成物不再入库)

jobs:
  seed:
    if: github.event_name == 'workflow_dispatch' && inputs.seed
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SEED_REF }}
          lfs: true  # 该历史点 news/img 存在 LFS, 拉真图而非指针

      - name: 装 SSH 凭据
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          HOST: ${{ secrets.HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id && chmod 600 ~/.ssh/id
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 全量推存量产物到服务器
        env:
          HOST: ${{ secrets.HOST }}
          USER: ${{ secrets.USER }}
        run: |
          SSH="ssh -i ~/.ssh/id"
          $SSH "$USER@$HOST" "mkdir -p $NEWS_DIR"
          rsync -az -e "$SSH" data/  "$USER@$HOST:$NEWS_DIR/data/"
          rsync -az -e "$SSH" news/  "$USER@$HOST:$NEWS_DIR/news/"
          rsync -az -e "$SSH" news.html news-c.html "$USER@$HOST:$NEWS_DIR/"
          echo "seed 完成: $NEWS_DIR 已就位, 之后常规轮增量续跑"

  sync:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && !inputs.seed)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4  # 浅克隆即可: 只要代码与页面模板壳, 不再 commit/push

      - name: 装 SSH 凭据
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          HOST: ${{ secrets.HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id && chmod 600 ~/.ssh/id
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 拉上一轮状态与产物
        env:
          HOST: ${{ secrets.HOST }}
          USER: ${{ secrets.USER }}
        run: |
          SSH="ssh -i ~/.ssh/id"
          # 种子文件(product-news/press-news)以仓库 checkout 为准, 不被服务器旧副本覆盖
          rsync -az -e "$SSH" \
            --exclude 'product-news.json' --exclude 'press-news.json' \
            "$USER@$HOST:$NEWS_DIR/data/" data/ \
            || { echo "::error::拉取服务器状态失败——若从未初始化, 先手动跑一次 seed(Run workflow 勾 seed)"; exit 1; }
          rsync -az -e "$SSH" "$USER@$HOST:$NEWS_DIR/news/" news/ || true  # 产物缺失只影响增量跳过, 可重建

      - name: 校验拉回状态完整(空/残缺则中止, 防 --delete 清空服务器 + 重烧 API)
        run: |
          python3 - <<'PY'
          import json, pathlib, sys
          nj = pathlib.Path("data/news.json")
          if not nj.exists():
              sys.exit("::error::data/news.json 缺失——服务器状态残缺, 中止(未初始化就先跑 seed)")
          try:
              items = json.loads(nj.read_text(encoding="utf-8")).get("items", [])
          except Exception as e:  # noqa: BLE001
              sys.exit(f"::error::data/news.json 解析失败({e}), 中止")
          if not items:
              sys.exit("::error::news.json 无存量条目(疑似空状态)——中止, 防止随后 --delete 清空服务器与重烧 AI 配额")
          print(f"状态校验通过: 存量 {len(items)} 条")
          PY

      - name: 跑动态管线(增量)
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: python3 build_news.py

      - name: 推产物与状态回服务器
        env:
          HOST: ${{ secrets.HOST }}
          USER: ${{ secrets.USER }}
        run: |
          SSH="ssh -i ~/.ssh/id"
          # 页面(p/c)由管线从 data/ 重建, --delete 清下线页; 但图片一次性下载不可重下
          # (localize 见正文里 ../img 相对路径即跳过), 故 img/ 不 --delete: 本地不全时也绝不
          # 清掉服务器已有真图(Bugbot PR#100)。孤儿图占用极小, 需要时另开清理不走这条热路径。
          rsync -az --delete -e "$SSH" news/p/ "$USER@$HOST:$NEWS_DIR/news/p/"
          rsync -az --delete -e "$SSH" news/c/ "$USER@$HOST:$NEWS_DIR/news/c/"
          rsync -az           -e "$SSH" news/img/ "$USER@$HOST:$NEWS_DIR/news/img/"
          rsync -az --delete -e "$SSH" data/ "$USER@$HOST:$NEWS_DIR/data/"
          rsync -az -e "$SSH" news.html news-c.html "$USER@$HOST:$NEWS_DIR/"
          echo "同步完成 → $NEWS_DIR (nginx 对外路由见 deploy/nginx-news.conf)"
