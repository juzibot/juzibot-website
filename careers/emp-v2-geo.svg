<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1536" width="1024" height="1536" role="img" aria-label="GEO 优化师">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#312E81"/>
      <stop offset="0.55" stop-color="#4338CA"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.6">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="38" height="38" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1024" height="1536" fill="url(#bg)"/>
  <rect width="1024" height="1536" fill="url(#dots)"/>
  <rect width="1024" height="1536" fill="url(#glow)"/>

  <!-- 巨型 GEO 水印（呼应原首页深色面板） -->
  <text x="540" y="1180" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif"
        font-size="760" font-weight="900" fill="#ffffff" fill-opacity="0.06"
        letter-spacing="-30">GEO</text>

  <!-- 主体 -->
  <text x="512" y="560" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="84" font-weight="800" letter-spacing="6" fill="#A5B4FC">AI 员工 · 全域营销</text>

  <text x="512" y="760" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif"
        font-size="300" font-weight="900" letter-spacing="-6" fill="#ffffff">GEO</text>

  <text x="512" y="930" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif"
        font-size="150" font-weight="900" fill="#ffffff">优化师</text>

  <!-- 一句话定位 -->
  <g transform="translate(512 1080)">
    <rect x="-300" y="-46" width="600" height="92" rx="46" fill="#ffffff" fill-opacity="0.10"/>
    <text x="0" y="14" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif"
          font-size="46" font-weight="700" fill="#E0E7FF">AI 时代的 SEO</text>
  </g>

  <!-- 链路 -->
  <text x="512" y="1300" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif"
        font-size="40" font-weight="600" fill="#C7D2FE" fill-opacity="0.9">被 AI 推荐 → 公域承接 → 私域复购</text>
</svg>
