<script>
/* —— 仅本页：多源信息流（来源一级筛选 + 分类二级筛选 + 时间区间筛选 + 搜索 + 分批加载 + 每卡「问句子」）——
   卡片模板与 build_news.py 的 card_html() 同构：改一处必须同步另一处 */
(function () {
  var BATCH = 20;
  var payload = {};
  try { payload = JSON.parse(document.getElementById('news-data').textContent.trim() || '{}') || {}; } catch (e) {}
  var data = payload.items || [], sources = payload.sources || [];
  var ICON = { 'rui-blog': 'fa-solid fa-pen-nib', 'wechat-mp': 'fa-brands fa-weixin', 'product': 'fa-solid fa-rocket', 'press': 'fa-solid fa-bullhorn', 'industry': 'fa-solid fa-rss', 'voices': 'fa-solid fa-feather', 'hn': 'fa-brands fa-hacker-news', 'qisi': 'fa-solid fa-lightbulb', 'wecom': 'fa-solid fa-plug' };

  var list = document.getElementById('newsList'),
      srcs = document.getElementById('newsSrcs'),
      cats = document.getElementById('newsCats'),
      times = document.getElementById('newsTimes'),
      q = document.getElementById('newsSearch'),
      count = document.getElementById('newsCount'),
      empty = document.getElementById('newsEmpty'),
      more = document.getElementById('newsMore'),
      reset = document.getElementById('newsReset'),
      total = document.getElementById('newsTotal'),
      sentinel = document.getElementById('newsSentinel');

  var state = { src: 'all', cat: 'all', time: 'all', cut: '', q: '', shown: list.querySelectorAll('.news-card').length };

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
  function safeHref(u) { u = String(u == null ? '' : u).trim(); return /^https?:\/\//i.test(u) ? esc(u) : '#'; }  // 与 Python safe_href 同构: 非 http(s) 外链回 #(Bugbot PR#100)

  // 时间区间筛选：cut 是往回推算的 YYYY-MM-DD 下限（本地时区），条目日期是同构字符串可直接比较
  function dstr(d) { return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2); }
  var TIMES = [
    { k: 'all', label: '全部时间', cut: '' },
    { k: '7d', label: '近一周', cut: dstr(new Date(Date.now() - 6 * 864e5)) },
    { k: '30d', label: '近一月', cut: dstr(new Date(Date.now() - 29 * 864e5)) },
    { k: '90d', label: '近三月', cut: dstr(new Date(Date.now() - 89 * 864e5)) },
    { k: 'year', label: '今年', cut: new Date().getFullYear() + '-01-01' }
  ];

  function cardHTML(it) {
    var icon = ICON[it.source] || 'fa-solid fa-newspaper';
    var title = it.title_zh || it.title;                              // 英文条目用中文译题, 原题降为小字
    var sum = it.title_zh ? (it.brief || it.summary) : it.summary;    // 英文条目摘要换中文简报
    return '<article class="news-card rv in" data-src="' + esc(it.source) + '">' +
      '<div class="nc-top"><span class="nc-srcb s-' + esc(it.source) + '"><i class="' + icon + '"></i>' + esc(it.source_name) + '</span>' +
      (it.category ? '<span class="nc-cat">' + esc(it.category) + '</span>' : '') +
      '<time class="nc-date" datetime="' + esc(it.date) + '">' + esc(it.date) + '</time></div>' +
      '<h3 class="nc-title"><a href="news/p/' + esc(it.id) + '.html">' + esc(title) + '</a></h3>' +
      (it.title_zh ? '<p class="nc-orig">原题：' + esc(it.title) + '</p>' : '') +
      '<p class="nc-sum">' + esc(sum) + '</p>' +
      (it.quip ? '<p class="nc-quip"><i class="fa-solid fa-quote-left"></i>' + esc(it.quip) + '</p>' : '') +
      '<div class="nc-foot">' +
      '<span class="nc-src">' + esc(it.author) + '</span>' +
      '<span class="nc-actions">' +
      '<button type="button" class="nc-ask" data-t="' + esc(title) + '"><i class="fa-solid fa-wand-magic-sparkles"></i>问句子</button>' +
      '<a class="nc-read" href="' + safeHref(it.url) + '" target="_blank" rel="noopener">读原文<i class="fa-solid fa-arrow-up-right-from-square"></i></a>' +
      '</span></div></article>';
  }

  function filtered() {
    var kw = state.q.toLowerCase();
    return data.filter(function (it) {
      if (state.src !== 'all' && it.source !== state.src) return false;
      if (state.cat !== 'all' && it.category !== state.cat) return false;
      if (state.cut && it.date < state.cut) return false;
      if (kw && (it.title + ' ' + (it.title_zh || '') + ' ' + it.summary + ' ' + (it.brief || '') + ' ' + it.category + ' ' + it.source_name).toLowerCase().indexOf(kw) < 0) return false;
      return true;
    });
  }

  function render(resetList) {
    var f = filtered();
    if (resetList) { list.innerHTML = ''; state.shown = 0; }
    var next = f.slice(state.shown, state.shown + BATCH);
    if (next.length) list.insertAdjacentHTML('beforeend', next.map(cardHTML).join(''));
    state.shown += next.length;
    var isFiltered = state.src !== 'all' || state.cat !== 'all' || state.time !== 'all' || state.q;
    count.textContent = isFiltered ? (f.length + ' / ' + data.length + ' 条') : ('共 ' + data.length + ' 条');
    empty.classList.toggle('show', f.length === 0);
    more.hidden = state.shown >= f.length;
  }

  function buildSrcs() {
    var html = '<button type="button" class="cat-btn on" data-src="all" role="tab" aria-selected="true">全部<small>' + data.length + '</small></button>';
    sources.forEach(function (s) {
      html += '<button type="button" class="cat-btn" data-src="' + esc(s.id) + '" role="tab" aria-selected="false"><i class="' + (ICON[s.id] || 'fa-solid fa-newspaper') + '"></i>' + esc(s.name) + '<small>' + s.count + '</small></button>';
    });
    srcs.innerHTML = html;
  }

  function buildCats() {
    cats.innerHTML = ''; cats.hidden = true;
    if (state.src === 'all') return;
    var seen = {}, order = [];
    data.forEach(function (it) {
      if (it.source !== state.src || !it.category) return;
      if (!seen[it.category]) { seen[it.category] = 0; order.push(it.category); }
      seen[it.category]++;
    });
    if (order.length < 2) return; // 该来源只有一种分类时二级筛选没有意义
    order.sort(function (a, b) { return seen[b] - seen[a]; });
    var html = '<button type="button" class="cat-btn on" data-cat="all">全部分类</button>';
    order.forEach(function (c) { html += '<button type="button" class="cat-btn" data-cat="' + esc(c) + '">' + esc(c) + '<small>' + seen[c] + '</small></button>'; });
    cats.innerHTML = html; cats.hidden = false;
  }

  function buildTimes() {
    times.innerHTML = TIMES.map(function (t) {
      return '<button type="button" class="cat-btn' + (t.k === state.time ? ' on' : '') + '" data-time="' + t.k + '">' +
        (t.k === 'all' ? '<i class="fa-solid fa-clock"></i>' : '') + t.label + '</button>';
    }).join('');
  }

  function mark(box, attr, val) {
    box.querySelectorAll('[' + attr + ']').forEach(function (x) {
      var on = x.getAttribute(attr) === val;
      x.classList.toggle('on', on);
      if (x.getAttribute('role') === 'tab') x.setAttribute('aria-selected', on ? 'true' : 'false');
    });
  }

  function init() {
    if (!data.length) { document.getElementById('newsBar').style.display = 'none'; return; } // 数据缺失：保留预渲染卡片兜底
    total.textContent = data.length;
    buildSrcs(); buildTimes();
    count.textContent = '共 ' + data.length + ' 条';
    more.hidden = state.shown >= data.length;

    srcs.addEventListener('click', function (e) {
      var b = e.target.closest('[data-src]'); if (!b) return;
      state.src = b.getAttribute('data-src'); state.cat = 'all';
      mark(srcs, 'data-src', state.src); buildCats(); render(true);
    });
    cats.addEventListener('click', function (e) {
      var b = e.target.closest('[data-cat]'); if (!b) return;
      state.cat = b.getAttribute('data-cat');
      mark(cats, 'data-cat', state.cat); render(true);
    });
    times.addEventListener('click', function (e) {
      var b = e.target.closest('[data-time]'); if (!b) return;
      state.time = b.getAttribute('data-time'); state.cut = '';
      for (var i = 0; i < TIMES.length; i++) if (TIMES[i].k === state.time) state.cut = TIMES[i].cut;
      mark(times, 'data-time', state.time); render(true);
    });

    var deb;
    q.addEventListener('input', function () { clearTimeout(deb); deb = setTimeout(function () { state.q = q.value.trim(); render(true); }, 180); });

    reset.addEventListener('click', function () {
      state.src = 'all'; state.cat = 'all'; state.time = 'all'; state.cut = ''; state.q = ''; q.value = '';
      mark(srcs, 'data-src', 'all'); mark(times, 'data-time', 'all'); buildCats(); render(true);
    });

    more.addEventListener('click', function () { render(false); });
    if ('IntersectionObserver' in window) {
      new IntersectionObserver(function (es) {
        es.forEach(function (en) { if (en.isIntersecting && !more.hidden) render(false); });
      }, { rootMargin: '400px 0px' }).observe(sentinel);
    }

    // 每卡「问句子」：把文章标题注入 askbar 的页面上下文再唤起
    list.addEventListener('click', function (e) {
      var b = e.target.closest('.nc-ask'); if (!b) return;
      window.PAGE_CTX = { entity: 'news-article', type: 'article', title: b.getAttribute('data-t') };
      if (window.openAskbar) window.openAskbar();
      else setTimeout(function () { if (window.openAskbar) window.openAskbar(); }, 450); // askbar 异步注入的兜底
    });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
