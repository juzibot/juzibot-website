[pytest]
# Python test harness for the website-redesign spec.
# Structural / preservation / metadata / token property tests (Hypothesis)
# plus example-based unit tests live under tests/.
#
# The Hypothesis settings profile that enforces the minimum of 100 iterations
# per property is registered and loaded in conftest.py (profile name: "ci").
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    property: a property-based (Hypothesis) test validating a design Correctness Property.
    unit: an example-based unit test for a specific scenario or error path.
    integration: a deploy/static-config integration or smoke test.
addopts = -ra
